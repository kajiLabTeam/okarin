name: Nozomi CI

on:
  push:
    branches: [main]
    paths:
      - "apps/nozomi/**"
      - ".github/workflows/nozomi-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/nozomi/**"
      - ".github/workflows/nozomi-ci.yml"

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/nozomi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Format Check
        run: uv run ruff format --check .

      - name: Type Check
        run: uv run mypy .

      - name: Test
        run: uv run pytest
