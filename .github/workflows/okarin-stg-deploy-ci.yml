name: Okarin Staging Deploy CI

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch name or tag name to deploy (default: current branch)"
        required: false

concurrency:
  group: okarin-stg-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SSH_PROXY_COMMAND: /tmp/cloudflared/cloudflared access ssh --id ${{ secrets.CLOUDFLARED_SSH_ID }} --secret ${{ secrets.CLOUDFLARED_SSH_SECRET }} --hostname %h
      TARGET_HOST: ${{ secrets.DEPLOY_STG_SSH_HOST }}
      TARGET_USER: ${{ secrets.DEPLOY_SSH_USER }}
    steps:
      - name: Resolve deploy ref
        env:
          INPUT_DEPLOY_REF: ${{ inputs.deploy_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          DEPLOY_REF="$INPUT_DEPLOY_REF"
          if [ -z "$DEPLOY_REF" ]; then
            DEPLOY_REF="$GITHUB_REF_NAME"
          fi
          if [ -z "$DEPLOY_REF" ]; then
            DEPLOY_REF="main"
          fi
          echo "DEPLOY_REF=$DEPLOY_REF" >> "$GITHUB_ENV"

      - name: Validate required secrets
        run: |
          test -n "$DEPLOY_REF"
          test -n "$TARGET_HOST"
          test -n "$TARGET_USER"

      - name: Validate deploy ref exists
        env:
          REPO_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          if [ "$DEPLOY_REF" = "main" ]; then
            exit 0
          fi

          if git ls-remote --exit-code --heads "$REPO_URL" "$DEPLOY_REF" >/dev/null 2>&1; then
            exit 0
          fi

          if git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$DEPLOY_REF" >/dev/null 2>&1; then
            exit 0
          fi

          echo "DEPLOY_REF '$DEPLOY_REF' was not found as a branch or tag in ${{ github.repository }}." >&2
          exit 1

      - name: Install cloudflared
        run: |
          mkdir -p /tmp/cloudflared
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cloudflared/cloudflared
          chmod +x /tmp/cloudflared/cloudflared
          /tmp/cloudflared/cloudflared --version
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_STG_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      - name: Run SSH command
        run: |
          ssh \
            -T \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ProxyCommand="$SSH_PROXY_COMMAND" \
            "$TARGET_USER@$TARGET_HOST" \
            "$DEPLOY_REF"
