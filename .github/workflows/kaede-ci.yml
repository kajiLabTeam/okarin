name: Kaede CI

on:
  push:
    branches: [main]
    paths:
      - "apps/kaede/**"
      - ".github/workflows/kaede-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/kaede/**"
      - ".github/workflows/kaede-ci.yml"

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/kaede
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/kaede/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format Check
        run: pnpm exec prettier --check .

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Docker Image Build
        run: DOCKER_BUILDKIT=1 docker build -f Dockerfile .
