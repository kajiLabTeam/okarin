services:
  kaede:
    restart: unless-stopped
    depends_on:
      nozomi:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  nozomi:
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/').status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
