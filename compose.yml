services:
  kaede:
    build:
      context: ./apps/kaede
    image: ${KAEDE_IMAGE:-okarin/kaede:latest}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-./env/local/common.env}
    environment:
      HOST: 0.0.0.0
      PORT: 3000

  nozomi:
    build:
      context: ./apps/nozomi
    image: ${NOZOMI_IMAGE:-okarin/nozomi:latest}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-./env/local/common.env}
    environment:
      HOST: 0.0.0.0
      PORT: 8000
