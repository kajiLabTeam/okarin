services:
  kaede:
    build:
      context: ./apps/kaede
    image: okarin/kaede:local
    depends_on:
      - nozomi
    ports:
      - "3000:3000"

  nozomi:
    build:
      context: ./apps/nozomi
    image: okarin/nozomi:local
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    ports:
      - "8000:8000"

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-./deploy/env.local}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:4.17}
    restart: unless-stopped
    command: server -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.conf -dir=/data
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs_data:/data
      - ./deploy/seaweedfs/s3.local.conf:/etc/seaweedfs/s3.conf:ro

volumes:
  postgres_data:
  seaweedfs_data:
