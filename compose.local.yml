services:
  kaede:
    build:
      context: ./apps/kaede
    image: okarin/kaede:local
    depends_on:
      - nozomi

  nozomi:
    build:
      context: ./apps/nozomi
    image: okarin/nozomi:local
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-okarin}
      POSTGRES_USER: ${POSTGRES_USER:-okarin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-okarin_local_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-okarin} -d ${POSTGRES_DB:-okarin}"]
      interval: 5s
      timeout: 3s
      retries: 20

  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    restart: unless-stopped
    command: server -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.conf -dir=/data
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3.conf:/etc/seaweedfs/s3.conf:ro

volumes:
  postgres_data:
  seaweedfs_data:
