services:
  kaede:
    build:
      context: ./apps/kaede
    image: okarin/kaede:production
    env_file:
      - ${ENV_FILE:-./deploy/env.production}

  nozomi:
    build:
      context: ./apps/nozomi
    image: okarin/nozomi:production
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    env_file:
      - ${ENV_FILE:-./deploy/env.production}

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-./deploy/env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:4.17}
    restart: unless-stopped
    command: server -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.conf -dir=/data
    volumes:
      - seaweedfs_data:/data
      - ./deploy/seaweedfs/s3.production.conf:/etc/seaweedfs/s3.conf:ro

volumes:
  postgres_data:
  seaweedfs_data:
